<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Loading Skeleton — Jobs — Ujednano Operator Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;font-size:14px;color:#0F172A;background:#F8FAFC;-webkit-font-smoothing:antialiased}
a{text-decoration:none}button{cursor:pointer;font-family:inherit}input,select{font-family:inherit}
:root{--navy:#073763;--teal:#00AFA8;--border:#E2E8F0;--card-shadow:0 1px 3px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.03)}
.btn-primary{display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 20px;font-size:14px;font-weight:500;color:#fff;background:#073763;border:none;border-radius:10px;cursor:pointer;font-family:inherit;transition:transform 150ms;text-decoration:none}
.btn-primary:hover{transform:translateY(-1px)}
.btn-secondary{display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 20px;font-size:14px;font-weight:500;color:#1E293B;background:#fff;border:1px solid #E2E8F0;border-radius:10px;cursor:pointer;font-family:inherit;text-decoration:none}
.btn-teal{display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 20px;font-size:14px;font-weight:500;color:#fff;background:#00AFA8;border:none;border-radius:10px;cursor:pointer;font-family:inherit;text-decoration:none}

/* Layout */
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:260px;min-width:260px;background:#042647;display:flex;flex-direction:column;height:100vh;overflow-y:auto;overflow-x:hidden;flex-shrink:0}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:24px 20px 20px}
.logo-name{font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.02em;line-height:1}
.logo-subtitle{font-size:11px;color:rgba(255,255,255,0.45);line-height:1}
.sidebar-section-label{font-size:10px;font-weight:600;color:rgba(255,255,255,0.28);letter-spacing:0.1em;text-transform:uppercase;padding:20px 20px 8px}
.sidebar-nav{display:flex;flex-direction:column;gap:1px;padding:0 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13.5px;font-weight:500;color:rgba(255,255,255,0.92);position:relative;text-decoration:none}
.nav-item.active{color:#00AFA8}
.nav-item.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:20px;background:#00AFA8;border-radius:0 2px 2px 0}
.nav-icon{flex-shrink:0;display:flex;align-items:center;width:18px;height:18px}
.nav-label{flex:1;white-space:nowrap}
.nav-badge{height:20px;min-width:20px;padding:0 6px;border-radius:10px;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.10);color:rgba(255,255,255,0.60)}
.sidebar-divider{height:1px;background:rgba(255,255,255,0.06);margin:12px 0}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:14px 16px;border-top:1px solid rgba(255,255,255,0.06);margin-top:auto}
.user-avatar{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.10);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:rgba(255,255,255,0.75)}
.user-info{flex:1;min-width:0}
.user-name{display:block;font-size:13px;font-weight:550;color:rgba(255,255,255,0.88);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.user-firm{display:block;font-size:11px;color:rgba(255,255,255,0.42);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.user-bell{display:flex;align-items:center;color:rgba(255,255,255,0.35);padding:6px;border-radius:6px;background:transparent;border:none}
.main{flex:1;overflow-y:auto;background:#F8FAFC;min-width:0}
.main-content{padding:36px 40px 48px}

/* Skeleton */
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.sk{background:linear-gradient(90deg,#F1F5F9 25%,#E8EDF2 50%,#F1F5F9 75%);background-size:1200px 100%;animation:shimmer 1.5s infinite;border-radius:6px}

/* Table */
.table-card{background:#fff;border-radius:12px;box-shadow:var(--card-shadow);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:#94A3B8;letter-spacing:0.06em;text-transform:uppercase;padding:12px 16px;text-align:left;background:#F8FAFC;border-bottom:1px solid #E2E8F0;white-space:nowrap}
td{padding:0 16px;vertical-align:middle;border-bottom:1px solid #E2E8F0}
tr:last-child td{border-bottom:none}
</style>
</head>
