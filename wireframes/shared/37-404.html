<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>404 — Page not found · Ujednano</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;font-size:14px;color:#0F172A;background:#F8FAFC;-webkit-font-smoothing:antialiased}
a{text-decoration:none}button{cursor:pointer;font-family:inherit}
:root{--navy:#073763;--navy-dark:#042647;--teal:#00AFA8;--border:#E2E8F0;--card-shadow:0 1px 3px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.03);--text-900:#0F172A;--text-800:#1E293B;--text-600:#475569;--text-500:#64748B;--text-400:#94A3B8;--text-300:#CBD5E1}
.btn-primary{display:inline-flex;align-items:center;gap:7px;height:44px;padding:0 24px;font-size:15px;font-weight:500;color:#fff;background:#073763;border:none;border-radius:10px;box-shadow:0 1px 2px rgba(7,55,99,0.14);cursor:pointer;font-family:inherit;transition:transform 150ms,box-shadow 150ms;text-decoration:none}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(7,55,99,0.2)}
.btn-secondary{display:inline-flex;align-items:center;gap:7px;height:44px;padding:0 24px;font-size:15px;font-weight:500;color:#1E293B;background:#fff;border:1px solid #E2E8F0;border-radius:10px;cursor:pointer;font-family:inherit;transition:border-color 120ms;text-decoration:none}
.btn-teal{display:inline-flex;align-items:center;gap:7px;height:44px;padding:0 24px;font-size:15px;font-weight:500;color:#fff;background:#00AFA8;border:none;border-radius:10px;cursor:pointer;font-family:inherit;text-decoration:none}

.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.center-col{max-width:440px;width:100%;text-align:center}
.big-number{font-size:80px;font-weight:750;color:rgba(7,55,99,0.08);letter-spacing:-0.05em;line-height:1;user-select:none}
.heading{font-size:26px;font-weight:650;color:#0F172A;letter-spacing:-0.025em;margin-top:4px}
.body-text{font-size:15px;color:#64748B;line-height:1.6;margin-top:12px}
.btn-wrap{margin-top:28px;display:flex;justify-content:center}
.footer-logo{margin-top:48px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:#94A3B8}
.footer-logo-name{font-size:14px;font-weight:700;color:#073763}
.footer-sep{margin:0 6px;color:#94A3B8}
</style>
</head>
<body>
<div class="page">
  <div class="center-col">
    <div class="big-number">404</div>
    <h1 class="heading">Page not found</h1>
    <p class="body-text">The page you are looking for doesn't exist or has been moved. Check the URL or return to the dashboard.</p>
    <div class="btn-wrap">
      <a href="../../designs/operator-dashboard-jobs.html" class="btn-primary">Go to dashboard</a>
    </div>
    <div class="footer-logo">
      <img src="../assets/logos/ujednano_horizontal_logo_mono_navy_transparent.png" alt="Ujednano" height="20" style="display:block;opacity:0.5">
      <span class="footer-sep">·</span>
      <span>Trust infrastructure</span>
    </div>
  </div>
</div>
</body>
</html>
